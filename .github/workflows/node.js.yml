name: Playwright Security Automation

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:
      CI: true
      PLAYWRIGHT_JUNIT_OUTPUT_NAME: results.xml
      DEBUG: pw:api

    steps:

      # ---------------------------------------------------
      # Checkout Repository
      # ---------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Setup Node.js
      # ---------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------------------------------------------
      # Display Environment Info
      # ---------------------------------------------------
      - name: Display Environment Information
        run: |
          echo "===== ENVIRONMENT INFO ====="
          node --version
          npm --version
          uname -a
          pwd
          ls -la
          echo "============================"

      # ---------------------------------------------------
      # Install Dependencies
      # ---------------------------------------------------
      - name: Install Dependencies
        run: |
          echo "Installing npm packages..."
          npm install

      # ---------------------------------------------------
      # Install Playwright Browsers
      # ---------------------------------------------------
      - name: Install Playwright Browsers
        run: |
          echo "Installing Playwright browsers..."
          npx playwright install --with-deps

      # ---------------------------------------------------
      # Restore Azure Entra Auth State
      # ---------------------------------------------------
      - name: Restore Playwright Authentication
        run: |
          echo "Restoring authentication state..."
          mkdir -p auth
          echo "${{ secrets.PLAYWRIGHT_AUTH }}" | base64 -d > auth/user.json

          echo "Auth file restored:"
          ls -la auth/

      # ---------------------------------------------------
      # Create Environment File
      # ---------------------------------------------------
      - name: Create Environment File
        run: |
          echo "Creating .env file..."

          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "PROJECT_NAME=HMEL Plus Security Automation" >> .env
          echo "TEST_ENV=UAT" >> .env
          echo "BROWSER=chromium" >> .env
          echo "HEADLESS=true" >> .env

          echo "===== .ENV CONTENT ====="
          cat .env
          echo "========================"

      # ---------------------------------------------------
      # Verify Playwright Configuration
      # ---------------------------------------------------
      - name: Verify Playwright Configuration
        run: |
          echo "Validating Playwright config..."
          npx playwright --version

      # ---------------------------------------------------
      # Run Playwright Tests
      # ---------------------------------------------------
      - name: Run Playwright Tests
        run: |
          echo "Starting Playwright execution..."

          npx playwright test \
            --reporter=list,html,json,junit

          echo "Playwright execution completed"

      # ---------------------------------------------------
      # List Generated Reports
      # ---------------------------------------------------
      - name: Display Generated Reports
        if: always()
        run: |
          echo "===== PLAYWRIGHT REPORT ====="
          ls -R playwright-report || true

          echo "===== TEST RESULTS ====="
          ls -R test-results || true

          echo "===== ARTIFACTS ====="
          ls -R test-results/artifacts || true

      # ---------------------------------------------------
      # Upload HTML Report
      # ---------------------------------------------------
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ---------------------------------------------------
      # Upload Test Results
      # ---------------------------------------------------
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # ---------------------------------------------------
      # Upload Authentication Logs
      # ---------------------------------------------------
      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test-results/artifacts/
            playwright-report/
          retention-days: 30

      # ---------------------------------------------------
      # Display Failure Summary
      # ---------------------------------------------------
      - name: Display Failure Summary
        if: failure()
        run: |
          echo "====================================="
          echo "PLAYWRIGHT EXECUTION FAILED"
          echo "====================================="

          echo "Displaying generated files..."

          find . -type f | sort

          echo "====================================="
          echo "Check uploaded artifacts for:"
          echo "- screenshots"
          echo "- traces"
          echo "- videos"
          echo "- html reports"
          echo "- custom-results.json"
          echo "====================================="
